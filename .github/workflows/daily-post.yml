name: Genesis Vault — Multi-Agent Daily Post

on:
  schedule:
    # 毎日午後7時30分(MYT/UTC+8)に実行 = UTC 11:30
    - cron: '30 11 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write

jobs:
  create-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1'

      - name: Run Multi-Agent Pipeline (VE-005 → VE-001 → VE-003 → VE-002 → VE-006)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: bun scripts/auto-post.mjs

      - name: Commit and push new post
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Mina Eureka Ernst [Bot]"
          git add src/content/posts/*.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "New post: $(date +'%Y-%m-%d') — Multi-Agent AI Pipeline" && git push)
