<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8C5D0"/>
      <stop offset="100%" stop-color="#8FA3B8"/>
    </linearGradient>
    <linearGradient id="hair-grad" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#2C5F9E"/>
      <stop offset="35%" stop-color="#3B7DD8"/>
      <stop offset="70%" stop-color="#5BA8E0"/>
      <stop offset="100%" stop-color="#7EECD6"/>
    </linearGradient>
    <linearGradient id="hair-highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9EE5F0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5BA8E0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shirt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2558B0"/>
      <stop offset="100%" stop-color="#1A3F85"/>
    </linearGradient>
    <linearGradient id="skin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE5D0"/>
      <stop offset="100%" stop-color="#F2C8A8"/>
    </linearGradient>
    <radialGradient id="cheek-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB3B3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFB3B3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg-grad)"/>

  <!-- Neck -->
  <path d="M165 240 Q165 270 175 290 L225 290 Q235 270 235 240 Z" fill="url(#skin-grad)"/>
  <path d="M165 260 Q200 275 235 260 L235 285 Q200 295 165 285 Z" fill="#E8B590" opacity="0.4"/>

  <!-- Shirt / Turtleneck -->
  <path d="M100 400 L100 310 Q130 290 165 285 Q180 300 200 302 Q220 300 235 285 Q270 290 300 310 L300 400 Z" fill="url(#shirt-grad)"/>
  <!-- Turtleneck collar -->
  <path d="M150 285 Q145 265 155 255 Q200 275 245 255 Q255 265 250 285 Q200 305 150 285 Z" fill="url(#shirt-grad)"/>
  <path d="M155 270 Q200 282 245 270" stroke="#1A3F85" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Hair back -->
  <path d="M110 180 Q100 100 155 70 Q200 50 250 75 Q300 105 295 180 Q310 220 290 260 Q280 230 275 220 L270 210 Q260 200 255 215 Q265 230 270 245 L265 255 Q255 240 245 235 L240 245 L115 245 Q105 225 110 180 Z" fill="url(#hair-grad)"/>

  <!-- Face -->
  <ellipse cx="200" cy="190" rx="62" ry="72" fill="url(#skin-grad)"/>

  <!-- Cheek blush -->
  <ellipse cx="160" cy="210" rx="18" ry="10" fill="url(#cheek-grad)"/>
  <ellipse cx="240" cy="210" rx="18" ry="10" fill="url(#cheek-grad)"/>

  <!-- Hair front / bangs -->
  <path d="M140 140 Q135 100 165 80 Q200 65 235 80 Q265 100 260 145 Q255 160 245 155 Q240 140 230 135 L225 155 Q215 150 205 158 Q195 145 180 155 Q170 145 160 155 Q150 145 145 160 Z" fill="url(#hair-grad)"/>
  <!-- Side hair strands -->
  <path d="M138 145 Q125 180 130 220 Q140 210 145 195 Q148 175 145 155 Z" fill="url(#hair-grad)"/>
  <path d="M262 145 Q275 180 270 220 Q260 210 255 195 Q252 175 255 155 Z" fill="url(#hair-grad)"/>
  <!-- Hair highlights -->
  <path d="M170 90 Q190 75 215 85 Q205 100 190 105 Q175 100 170 90 Z" fill="url(#hair-highlight)"/>
  <path d="M150 150 Q155 175 148 200" stroke="#9EE5F0" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M250 150 Q245 175 252 200" stroke="#9EE5F0" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Eyebrows -->
  <path d="M158 165 Q168 160 180 165" stroke="#2C5F9E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M220 165 Q232 160 242 165" stroke="#2C5F9E" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="170" cy="190" rx="10" ry="12" fill="white"/>
  <ellipse cx="230" cy="190" rx="10" ry="12" fill="white"/>
  <!-- Iris -->
  <ellipse cx="170" cy="192" rx="7" ry="10" fill="#4A90C4"/>
  <ellipse cx="230" cy="192" rx="7" ry="10" fill="#4A90C4"/>
  <!-- Iris highlights -->
  <circle cx="170" cy="189" r="2.5" fill="#1A3F85"/>
  <circle cx="230" cy="189" r="2.5" fill="#1A3F85"/>
  <circle cx="172" cy="187" r="1.8" fill="white"/>
  <circle cx="232" cy="187" r="1.8" fill="white"/>
  <!-- Lower lid shadow (sleepy look) -->
  <path d="M160 193 Q170 199 180 193" stroke="#E8B590" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M220 193 Q230 199 240 193" stroke="#E8B590" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Nose -->
  <path d="M198 210 Q200 220 202 225" stroke="#E8B590" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Mouth -->
  <path d="M188 235 Q200 242 212 235" stroke="#C4937A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M192 236 Q200 239 208 236" fill="#E89080" opacity="0.5"/>

  <!-- Light ray effect (from original artwork) -->
  <line x1="350" y1="40" x2="280" y2="180" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="370" y1="100" x2="320" y2="200" stroke="white" stroke-width="1" opacity="0.3"/>
</svg>
